# XcodeGen spec — the reliable way to (re)generate Blueprint.xcodeproj.
#   brew install xcodegen   # one-time
#   cd ios && xcodegen generate
#
# The committed Blueprint.xcodeproj is hand-written and should open directly in
# Xcode 16+; if it ever misbehaves (or you add files/dependencies), regenerate
# from this spec instead.
name: Blueprint
options:
  bundleIdPrefix: com.ravesinc
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "M86QQRTURU"   # RAVES Apple Developer Team
targets:
  Blueprint:
    type: application
    platform: iOS
    sources:
      - path: Blueprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ravesinc.blueprint
        INFOPLIST_FILE: Blueprint/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic

  # Unit tests (XCTest, hosted in the app so @testable import Blueprint works —
  # XcodeGen wires TEST_HOST/BUNDLE_LOADER from the target dependency). Run via
  # ios/scripts/test.sh locally or the iOS workflow in CI.
  BlueprintTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BlueprintTests
    dependencies:
      - target: Blueprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ravesinc.blueprint.tests
        GENERATE_INFOPLIST_FILE: "YES"

# Explicit scheme so `xcodebuild test -scheme Blueprint` runs the unit tests;
# without it XcodeGen emits per-target schemes and the app scheme has no Test
# action wired.
schemes:
  Blueprint:
    build:
      targets:
        Blueprint: all
    test:
      targets:
        - BlueprintTests
