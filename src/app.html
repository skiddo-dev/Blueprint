<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- SVG favicon (crisp in the tab at any size); PNG fallback for older browsers. -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.png" sizes="any" />
  <!-- viewport-fit=cover lets content extend under the notch; CSS reclaims the
       space with env(safe-area-inset-*). -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <meta name="description" content="Email-to-Task Kanban for grocery construction — board, dashboard and quote generator." />
  <meta name="theme-color" content="#6366f1" />

  <!-- Add-to-Home-Screen / installable PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Blueprint" />
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
