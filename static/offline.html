<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <title>Offline · Blueprint</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, system-ui, sans-serif;
      background: #f8fafc; color: #1e293b;
      display: flex; align-items: center; justify-content: center;
      padding: max(1rem, env(safe-area-inset-top)) 1rem max(1rem, env(safe-area-inset-bottom));
    }
    .card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
      box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
      padding: 32px 28px; max-width: 380px; width: 100%; text-align: center;
    }
    .emoji { font-size: 44px; line-height: 1; }
    h1 { font-size: 20px; font-weight: 800; margin: 14px 0 6px; letter-spacing: -0.01em; }
    p { font-size: 14px; color: #64748b; line-height: 1.5; }
    button {
      margin-top: 20px; cursor: pointer;
      font: 600 14px/1 inherit; font-family: inherit;
      color: #fff; background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      border: none; border-radius: 9px; padding: 12px 20px; min-height: 44px;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.35);
    }
    .brand { margin-top: 18px; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">📡</div>
    <h1>You’re offline</h1>
    <p>Blueprint can’t reach the server right now. Check your connection and try again — your board will load as soon as you’re back online.</p>
    <button onclick="location.reload()">Try again</button>
    <div class="brand">🏗️ Blueprint</div>
  </div>
  <script>
    // Auto-retry the moment the browser regains connectivity.
    addEventListener('online', () => location.reload())
  </script>
</body>
</html>
