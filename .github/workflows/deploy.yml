name: Deploy to Azure Container Apps

# Build the image ONCE on the runner, push to ACR, then promote the SAME image
# (by git sha) through Beta → (manual approval) → Prod. Prod gets exactly the bits
# Beta validated — no rebuild drift. Each stage health-gates the rollout (revision
# Running + /readyz=200 + sign-in entry point non-5xx) and rolls back on failure.
# See .github/scripts/health-gate.sh and .github/DEPLOY.md.
#
# Beta runs REAL Entra auth (the dev DEV_FAKE_AUTH bypass is off in the prod image),
# so the real OAuth redirect path — the one the 2026-06-08 outage broke and that
# dev/CI/preview never exercise — is validated before prod.
#
# NOTE: this does NOT use `az acr build` (ACR Tasks) — this subscription rejects
# them (TasksOperationsNotAllowed) — so the runner builds and pushes itself.
# Azure auth is OIDC (no stored credential).
#
# Emergency: a Beta outage must never block a prod hotfix. Run this workflow via
# "Run workflow" with skip_beta=true to deploy straight to Prod (still gated +
# rolled back on prod itself).

on:
  workflow_dispatch:
    inputs:
      skip_beta:
        description: "Emergency: skip Beta and deploy straight to Prod"
        type: boolean
        default: false
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false # never cancel a deploy mid-rollout

permissions:
  id-token: write # required for Azure OIDC login (no stored credential)
  contents: read

env:
  IMAGE_NAME: blueprint
  # Container Apps runs amd64. The build MUST target linux/amd64 regardless of the
  # build host arch.
  IMAGE_PLATFORM: linux/amd64
  BETA_APP: raves-blueprint-beta

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ACR
        # Reuses the OIDC az session to fetch an ACR token — no registry password
        # stored in GitHub. (Push rights come from Contributor on the resource group.)
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Build & push image to ACR (runner-side build — `az acr build` is blocked here)
        run: |
          REGISTRY="${{ secrets.ACR_NAME }}.azurecr.io"
          docker buildx build \
            --platform "${IMAGE_PLATFORM}" \
            --tag "${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}" \
            --tag "${REGISTRY}/${IMAGE_NAME}:latest" \
            --file Dockerfile \
            --push \
            .

  deploy-beta:
    needs: build
    runs-on: ubuntu-latest
    # Skipped only on an explicit emergency workflow_dispatch with skip_beta=true.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_beta != true }}
    steps:
      - uses: actions/checkout@v6 # for .github/scripts/health-gate.sh

      - name: Log in to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Roll out to Beta and gate (rollback on failure)
        run: |
          set -uo pipefail
          az config set extension.use_dynamic_install=yes_without_prompt
          APP="${BETA_APP}"
          RG="${{ secrets.RESOURCE_GROUP }}"
          IMG="${{ secrets.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}"
          PREV=$(az containerapp show -n "$APP" -g "$RG" --query "properties.template.containers[0].image" -o tsv 2>/dev/null || true)
          echo "Beta previous image: ${PREV:-<none>}"
          az containerapp update --name "$APP" --resource-group "$RG" --image "$IMG"
          bash .github/scripts/health-gate.sh "$APP" "$RG" "$IMG" "$PREV"

  deploy-prod:
    needs: deploy-beta
    runs-on: ubuntu-latest
    # The `production` environment carries the required-reviewer (manual approval)
    # gate — configure it in repo Settings → Environments. Runs when Beta passed,
    # or when Beta was deliberately skipped via the emergency dispatch.
    environment: production
    if: ${{ always() && contains(fromJSON('["success","skipped"]'), needs.deploy-beta.result) }}
    steps:
      - uses: actions/checkout@v6 # for .github/scripts/health-gate.sh

      - name: Log in to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Promote the Beta-validated image to Prod and gate (rollback on failure)
        run: |
          set -uo pipefail
          az config set extension.use_dynamic_install=yes_without_prompt
          APP="${{ secrets.CONTAINERAPP_NAME }}"
          RG="${{ secrets.RESOURCE_GROUP }}"
          IMG="${{ secrets.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}"
          PREV=$(az containerapp show -n "$APP" -g "$RG" --query "properties.template.containers[0].image" -o tsv 2>/dev/null || true)
          echo "Prod previous image: ${PREV:-<none>}"
          az containerapp update --name "$APP" --resource-group "$RG" --image "$IMG"
          bash .github/scripts/health-gate.sh "$APP" "$RG" "$IMG" "$PREV"
