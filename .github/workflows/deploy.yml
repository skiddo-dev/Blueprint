name: Deploy to Azure Container Apps

# Builds the Docker image ON THE GITHUB RUNNER, pushes it to ACR, and rolls it
# out to the Container App.
#
# NOTE: this does NOT use `az acr build` (ACR Tasks). This subscription rejects
# ACR Tasks with `TasksOperationsNotAllowed`, so the runner must build and push
# the image itself (proven manual path: `docker buildx build --platform
# linux/amd64 ... --push` then `az containerapp update`).
#
# Auth to Azure uses OIDC (no stored credential); ACR push reuses that same
# OIDC session via `az acr login`.
#
# One-time setup (secrets + Azure OIDC + app runtime env): see .github/DEPLOY.md
on:
  workflow_dispatch: {}
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false # never cancel a deploy mid-rollout

permissions:
  id-token: write # required for Azure OIDC login (no stored credential)
  contents: read

env:
  IMAGE_NAME: blueprint
  # Container Apps runs amd64. The build MUST target linux/amd64 — the registry
  # image has to be amd64 regardless of what arch the build host is.
  IMAGE_PLATFORM: linux/amd64

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ACR
        # Reuses the OIDC-authenticated az session above to fetch an ACR token
        # and write it into the Docker config — no registry username/password
        # is stored in GitHub. (Requires the deploy identity to have push rights
        # on the registry; Contributor on the resource group covers it.)
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Build & push image to ACR (runner-side build — `az acr build` is blocked here)
        run: |
          REGISTRY="${{ secrets.ACR_NAME }}.azurecr.io"
          docker buildx build \
            --platform "${IMAGE_PLATFORM}" \
            --tag "${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}" \
            --tag "${REGISTRY}/${IMAGE_NAME}:latest" \
            --file Dockerfile \
            --push \
            .

      - name: Roll out new image to the Container App
        run: |
          set -uo pipefail
          az config set extension.use_dynamic_install=yes_without_prompt
          APP="${{ secrets.CONTAINERAPP_NAME }}"
          RG="${{ secrets.RESOURCE_GROUP }}"
          # Capture the currently-serving image so the health gate can roll back to it.
          PREV=$(az containerapp show -n "$APP" -g "$RG" --query "properties.template.containers[0].image" -o tsv 2>/dev/null || true)
          echo "PREV_IMAGE=$PREV" >> "$GITHUB_ENV"
          echo "Previous image: ${PREV:-<none>}"
          az containerapp update \
            --name "$APP" \
            --resource-group "$RG" \
            --image "${{ secrets.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}"

      # Gate the deploy on the NEW revision actually coming up healthy. `az
      # containerapp update` returns once the rollout is accepted, not once it's
      # serving — so without this, a crash-on-boot image (a bad migration, the
      # DEV_FAKE_AUTH guard, a missing env var) would leave CI green while prod
      # kept serving the previous revision. Identify the revision running THIS
      # image (by sha), wait for it to run, and confirm /readyz on the ingress.
      - name: Health-gate the rollout (rollback on failure)
        run: |
          set -uo pipefail
          APP="${{ secrets.CONTAINERAPP_NAME }}"
          RG="${{ secrets.RESOURCE_GROUP }}"
          IMG="${{ secrets.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}"
          FQDN=$(az containerapp show -n "$APP" -g "$RG" --query properties.configuration.ingress.fqdn -o tsv)
          # Restore the previously-serving image (captured in the rollout step) so a
          # bad deploy never lingers in front of users, then fail the job so it's loud.
          rollback() {
            if [ -n "${PREV_IMAGE:-}" ] && [ "${PREV_IMAGE:-}" != "$IMG" ]; then
              echo "::warning::deploy gate failed — rolling back to $PREV_IMAGE"
              az containerapp update -n "$APP" -g "$RG" --image "$PREV_IMAGE" >/dev/null 2>&1 || echo "::error::rollback command failed"
            else
              echo "::warning::no distinct previous image to roll back to"
            fi
          }
          echo "Gating on the revision running $IMG via https://$FQDN/readyz"
          for i in $(seq 1 30); do
            REV=$(az containerapp revision list -n "$APP" -g "$RG" \
              --query "[?properties.template.containers[0].image=='$IMG'] | [0].name" -o tsv 2>/dev/null || true)
            STATE=""
            if [ -n "$REV" ]; then
              STATE=$(az containerapp revision show -n "$APP" -g "$RG" --revision "$REV" \
                --query properties.runningState -o tsv 2>/dev/null || true)
            fi
            CODE=$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 10 "https://$FQDN/readyz" 2>/dev/null || echo 000)
            echo "attempt $i/30: revision=${REV:-<none>} state=${STATE:-?} /readyz=$CODE"
            if { [ "$STATE" = "Running" ] || [ "$STATE" = "RunningAtMaxScale" ]; } && [ "$CODE" = "200" ]; then
              echo "✅ new revision is healthy and serving"; exit 0
            fi
            if [ "$STATE" = "Failed" ]; then echo "::error::revision $REV failed to start"; rollback; exit 1; fi
            sleep 10
          done
          echo "::error::new revision did not become healthy within ~5 min — deploy gate failed"
          rollback
          exit 1
